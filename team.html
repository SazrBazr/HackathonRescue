<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Team Field Interface - Auto Advance</title>
    <style>
        /* Global UI Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; 
            -webkit-user-select: none;
        }

        body {
            background-color: #0d0d0c;
            font-family: 'Inter', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 15px;
        }

        /* Live Data Input Feed Panel */
        .data-feed-selector {
            background-color: #111111;
            border: 1px solid #333333;
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #aaaaaa;
        }

        .data-feed-selector select {
            background-color: #000000;
            color: #ff6b00;
            border: 1px solid #ff6b00;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            outline: none;
        }

        /* Target Device Shell (360x640 Viewport) */
        .device-container {
            width: 360px;
            height: 640px;
            background-color: #000000;
            border: 4px solid #333333;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        /* Screen States */
        .screen-state {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.2s ease-in-out;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        /* --- STATE 1: NAVIGATION MODE --- */
        .header-nav {
            font-size: 12px;
            font-weight: 700;
            color: #888888;
            letter-spacing: 1.5px;
            text-align: center;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .body-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }

        .directional-arrow {
            width: 140px;
            height: 140px;
            fill: #FF6B00; 
            filter: drop-shadow(0px 0px 15px rgba(255, 107, 0, 0.4));
            transition: transform 0.1s linear, fill 0.3s ease; 
            transform: rotate(0deg); 
        }

        .readout-distance {
            font-size: 54px;
            font-weight: 900;
            line-height: 1;
            text-align: center;
        }

        .readout-depth {
            font-size: 24px;
            font-weight: 500;
            color: #00E5FF; 
            text-align: center;
            margin-top: 8px;
        }

        .footer-nav {
            text-align: center;
            background-color: #111111;
            padding: 16px;
            border-radius: 12px;
            border: 1px dashed #444444;
            cursor: pointer;
            animation: pulse-border 2s infinite;
        }

        .footer-nav p {
            font-size: 13px;
            font-weight: 600;
            color: #aaaaaa;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* --- STATE 2: TRIAGE MODE --- */
        .header-triage {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-top: 10px;
        }

        .victim-id {
            font-family: monospace;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .vitals-status {
            font-size: 14px;
            font-weight: 600;
            color: #00C853; 
            margin-top: 4px;
        }

        .body-triage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            gap: 24px;
            margin-top: 20px;
        }

        /* Swipe Track Configurations */
        .swipe-container {
            position: relative;
            height: 120px; 
            border-radius: 60px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swipe-label {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 1;
            text-transform: uppercase;
        }

        .swipe-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 3;
        }

        .swipe-handle {
            position: absolute;
            left: 8px;
            width: 104px;
            height: 104px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: bold;
            color: white;
            z-index: 2;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            pointer-events: none;
            transition: left 0.05s linear;
        }

        .swipe-container.success {
            background-color: #00230e; 
            border: 2px solid #00C853;
        }
        .swipe-container.success .swipe-label { color: #a2fcd2; }
        .swipe-container.success .swipe-handle { background-color: #00C853; }

        .swipe-container.danger {
            background-color: #260202; 
            border: 2px solid #D50000;
        }
        .swipe-container.danger .swipe-label { color: #ffa3a3; }
        .swipe-container.danger .swipe-handle { background-color: #D50000; }

        .sim-info-box {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: #666666;
            font-size: 12px;
        }

        @keyframes pulse-border {
            0% { border-color: #444444; }
            50% { border-color: #FF6B00; }
            100% { border-color: #444444; }
        }
    </style>
</head>
<body>

    <div class="data-feed-selector">
        <label for="rescuer-select">🧑‍🚒 I AM:</label>
        <select id="rescuer-select" onchange="changeMyRescuer()">
            </select>
        <span id="assignment-label" style="margin-left:10px;font-size:12px;color:#aaa;">no target assigned</span>
    </div>

    <div class="device-container">
        
        <div id="screen-nav" class="screen-state">
            <div class="header-nav" id="team-status">TEAM ALPHA - SEEKING</div>
            
            <div class="body-nav">
                <svg id="arrow-icon" class="directional-arrow" viewBox="0 0 24 24">
                    <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                </svg>
                
                <div>
                    <div class="readout-distance" id="dist-text">--m</div>
                    <div class="readout-depth" id="depth-text">↓ --m Below</div>
                </div>
            </div>
            
            <div class="footer-nav" onclick="simulateNFCScan()">
                <p id="footer-prompt">
                    <span id="prompt-text">NAVIGATING ON-GRID... (TAP TO SIMULATE NFC)</span>
                </p>
            </div>
        </div>

        <div id="screen-triage" class="screen-state hidden">
            <div class="header-triage">
                <div class="victim-id" id="triage-victim-id">FOUND: #----</div>
                <div class="vitals-status" id="triage-vitals-status">Vitals: --</div>
            </div>
            
            <div class="body-triage">
                <div class="swipe-container success">
                    <span class="swipe-label" id="label-success">Swipe to Confirm Rescue</span>
                    <div class="swipe-handle" id="handle-success">✓</div>
                    <input type="range" class="swipe-slider" id="slider-success" min="0" max="100" value="0">
                </div>
                
                <div class="swipe-container danger">
                    <span class="swipe-label" id="label-danger">Swipe to Confirm Dead</span>
                    <div class="swipe-handle" id="handle-danger">✕</div>
                    <input type="range" class="swipe-slider" id="slider-danger" min="0" max="100" value="0">
                </div>
            </div>
        </div>

        <div class="sim-info-box">Simulation Environment Only</div>
    </div>

    <script>
        // Initial fallback data (used only until the first live fetch lands,
        // so the UI never starts empty). Replaced by live API data on load.
        let jsonData = {
            "victims": [],
            "rescuers": [
                { "rescuer_id": "Rescuer-1", "team": "North", "status": "STANDBY", "x": 18, "y": 22, "heading": 0 }
            ],
            "assignments": {}
        };

        // Layout Nodes
        const screenNav = document.getElementById('screen-nav');
        const screenTriage = document.getElementById('screen-triage');
        const arrowIcon = document.getElementById('arrow-icon');
        const distText = document.getElementById('dist-text');
        const depthText = document.getElementById('depth-text');
        const teamStatus = document.getElementById('team-status');
        const promptText = document.getElementById('prompt-text');
        const dropdown = document.getElementById('rescuer-select');
        const assignmentLabel = document.getElementById('assignment-label');
        
        const triageId = document.getElementById('triage-victim-id');
        const triageVitals = document.getElementById('triage-vitals-status');

        const maxMove = 360 - 40 - 104 - 16; 

        // State Trackers
        let animationFrameId;
        let myRescuerId = null;
        let visualAngle = 0;
        let deviceHeading = null;

        function myRescuer() {
            return jsonData.rescuers.find(r => r.rescuer_id === myRescuerId) || jsonData.rescuers[0];
        }
        function myAssignedVictim() {
            const a = (jsonData.assignments || {})[myRescuerId];
            if (!a) return null;
            return jsonData.victims.find(v => v.victim_id === a.victim_id) || null;
        }

        function initDropdown() {
            dropdown.innerHTML = "";
            jsonData.rescuers.forEach((r) => {
                const opt = document.createElement('option');
                opt.value = r.rescuer_id;
                opt.innerHTML = `${r.rescuer_id} (Team ${r.team})`;
                dropdown.appendChild(opt);
            });
            if (!myRescuerId && jsonData.rescuers.length) {
                myRescuerId = jsonData.rescuers[0].rescuer_id;
            }
            dropdown.value = myRescuerId;
        }

        function changeMyRescuer() {
            myRescuerId = dropdown.value;
            arrowIcon.style.fill = "#FF6B00";
            screenTriage.classList.add('hidden');
            screenNav.classList.remove('hidden');
            cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(calculateVectorPhysics);
        }

        // --- TRACKING VECTOR RUNTIME ENGINE ---
        function calculateVectorPhysics() {
            const me = myRescuer();
            const victim = myAssignedVictim();

            if (!victim) {
                teamStatus.innerText = `${myRescuerId} — AWAITING ASSIGNMENT`;
                assignmentLabel.innerText = "no target assigned";
                distText.innerText = "--m";
                depthText.innerText = "↓ --m Below";
                arrowIcon.style.opacity = 0.2;
                promptText.innerText = "Waiting for the commander to assign you a victim...";
                animationFrameId = requestAnimationFrame(calculateVectorPhysics);
                return;
            }

            arrowIcon.style.opacity = 1;
            assignmentLabel.innerText = `target: ${victim.victim_id.substring(0,8)}`;

            const deltaX = victim.location.x_coord - me.x;
            const deltaY = victim.location.y_coord - me.y;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            const bearing = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
            const heading = (deviceHeading != null) ? deviceHeading : (me.heading || 0);
            let relative = bearing - heading - 90;

            if (distance > 1.5) {
                visualAngle += (((relative - visualAngle + 540) % 360) - 180) * 0.15;
                distText.innerText = distance.toFixed(1) + "m";
                arrowIcon.style.transform = `rotate(${visualAngle}deg)`;
                depthText.innerText = `↓ ${victim.metrics.calculated_depth_meters}m Below`;
                teamStatus.innerText = `${myRescuerId} — NAVIGATING`;
                promptText.innerText = (deviceHeading != null)
                    ? "Follow the arrow. (Live compass)"
                    : "Follow the arrow. (Simulated heading)";
            } else {
                distText.innerText = "0.0m";
                arrowIcon.style.transform = `rotate(0deg)`;
                arrowIcon.style.fill = "#FFD600";
                teamStatus.innerText = `${myRescuerId} — ABOVE TARGET`;
                promptText.innerText = "At target. Tap to assess victim.";
            }
            animationFrameId = requestAnimationFrame(calculateVectorPhysics);
        }

        function enableCompass() {
            if (typeof DeviceOrientationEvent === 'undefined') return;
            const handler = (e) => {
                if (e.webkitCompassHeading != null) deviceHeading = e.webkitCompassHeading;
                else if (e.alpha != null) deviceHeading = 360 - e.alpha;
            };
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(p => {
                    if (p === 'granted') window.addEventListener('deviceorientation', handler);
                }).catch(() => {});
            } else {
                window.addEventListener('deviceorientation', handler);
            }
        }

        function simulateNFCScan() {
            const victim = myAssignedVictim();
            if (!victim) return;
            cancelAnimationFrame(animationFrameId);

            triageId.innerText = `FOUND: #${victim.victim_id.toUpperCase()}`;
            const f = victim.flags || {};
            let cond = [];
            if (f.active_hemorrhage) cond.push("⚠ possible hemorrhage");
            if (f.possible_panic) cond.push("possible panic (high HR, good O2)");
            if (victim.metrics.current_spo2 < 90) cond.push("low oxygen");
            if (victim.metrics.current_bpm < 50) cond.push("low heart rate");
            const condStr = cond.length ? cond.join(" · ") : "no critical flags from vitals";
            triageVitals.innerHTML = `Vitals: BPM ${victim.metrics.current_bpm} | SpO2 ${victim.metrics.current_spo2}%<br>`
                + `Status: ${victim.triage_status} — ${condStr}<br>`
                + `<span style="font-size:11px;color:#888">Injury check (e.g. fracture) requires on-site assessment.</span>`;
            triageVitals.style.color = (victim.triage_status === "CRITICAL") ? "#FFD600" : "#00C853";

            screenNav.classList.add('hidden');
            screenTriage.classList.remove('hidden');
        }

        // --- DOUBLE SWIPE LOGIC CHAIN ---
        function setupSwipeComponent(sliderId, handleId, labelId, completionCallback) {
            const slider = document.getElementById(sliderId);
            const handle = document.getElementById(handleId);
            const label = document.getElementById(labelId);

            slider.addEventListener('input', (e) => {
                const value = e.target.value;
                const newLeft = 8 + (value / 100) * maxMove;
                handle.style.left = `${newLeft}px`;
                label.style.opacity = 1 - (value / 55);

                if (value >= 100) {
                    completionCallback();
                    resetSwipe(slider, handle, label);
                }
            });

            const snapBack = () => { if (slider.value < 100) resetSwipe(slider, handle, label); };
            slider.addEventListener('touchend', snapBack);
            slider.addEventListener('mouseup', snapBack);
        }

        function resetSwipe(slider, handle, label) {
            slider.value = 0;
            handle.style.left = '8px';
            label.style.opacity = 1;
        }

        setupSwipeComponent('slider-success', 'handle-success', 'label-success', () => {
            submitStatus('RESCUED (V)');
        });

        setupSwipeComponent('slider-danger', 'handle-danger', 'label-danger', () => {
            submitStatus('DECEASED (X)');
        });

        // --- AUTOMATIC PIPELINE MANAGEMENT SHIFT ---
        async function submitStatus(outcome) {
            const victim = myAssignedVictim();
            // Tell the backend this rescuer has CONFIRMED + reached their target.
            try {
                await fetch(API_URL.replace('/state', '/confirm'), {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ rescuer_id: myRescuerId })
                });
            } catch (e) { console.error('confirm failed', e); }

            alert(`REPORT SENT TO COMMAND:\nRescuer: ${myRescuerId}\nTarget: ${victim ? victim.victim_id : '--'}\nOutcome: ${outcome}`);

            screenTriage.classList.add('hidden');
            screenNav.classList.remove('hidden');
            cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(calculateVectorPhysics);
        }

        // --- LIVE DATA SYNC ---
        const API_URL = 'http://127.0.0.1:8000/state';

        async function syncLiveData() {
            try {
                const res = await fetch(API_URL + '?t=' + new Date().getTime());
                if (!res.ok) throw new Error('bad response');
                const data = await res.json();
                if (!data.rescuers || data.rescuers.length === 0) return;

                const oldRescuers = jsonData.rescuers.map(r => r.rescuer_id).join(',');
                const newRescuers = data.rescuers.map(r => r.rescuer_id).join(',');
                jsonData = data;

                // Rebuild the "I am" list only if the roster changed.
                if (oldRescuers !== newRescuers) {
                    initDropdown();
                }
            } catch (e) {
                console.error('Live sync failed (using last known data):', e);
            }
        }

        window.onload = () => {
            initDropdown();
            enableCompass();
            changeMyRescuer();
            syncLiveData();
            setInterval(syncLiveData, 5000);
        };
    </script>
</body>
</html>
